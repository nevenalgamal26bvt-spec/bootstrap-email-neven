<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Email</title>
    <!--Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Custom CSS-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="header text-center bg-secondary text-white p-5 mb-4">
            Inbox 
        </div>
        <div class='mb-5'>
            <input class="form-control" placeholder="Search"/>
        </div>
        <div class="row mb-2 bg-light align-items-center border-bottom p-3">
            <div class=" col-5  col-md-4  col-lg-3"> <strong>John Doe</strong></div>
            <div class=" col-7  col-md-8  col-lg-9"> Meeting tomorrow</div>
        </div>
        <div class="row mb-2 bg-light align-items-center border-bottom p-3">
            <div class=" col-5  col-md-4  col-lg-3"> <strong>Sara</strong></div>
            <div class=" col-7  col-md-8  col-lg-9"> New updates avilable</div>
        </div>
        <div class="row mb-2 bg-light align-items-center border-bottom p-3">
            <div class=" col-5  col-md-4  col-lg-3"> <strong>Michael Brown</strong></div>
            <div class=" col-7  col-md-8  col-lg-9"> Please review the document</div>
        </div>
        <div class="row mb-2 bg-light align-items-center border-bottom p-3">
            <div class=" col-5  col-md-4  col-lg-3"> <strong>Emily Davis </strong></div>
            <div class=" col-7  col-md-8  col-lg-9"> Your order has been shipped </div>
        </div>
        <div class="row mb-2 bg-light align-items-center border-bottom p-3">
            <div class=" col-5  col-md-4  col-lg-3"> <strong>Neven Algamal </strong></div>
            <div class=" col-7  col-md-8  col-lg-9"> Your interview tomorrow at 10 :00 am </div>
        </div>
    </div>

</body>
</html>
